name: Build NexoriaOS Kernel (LTO+Clang)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - name: Installa dipendenze di build
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libelf-dev \
            cpio pahole gnupg curl xz-utils clang lld llvm

      - name: Scarica e verifica il kernel vanilla
        run: |
          curl -O https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-7.1.3.tar.xz
          curl -O https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-7.1.3.tar.sign
          gpg --locate-keys torvalds@kernel.org gregkh@kernel.org
          xz -d -k linux-7.1.3.tar.xz
          gpg --verify linux-7.1.3.tar.sign linux-7.1.3.tar
          tar xf linux-7.1.3.tar.xz

      - name: Applica le patch
        working-directory: linux-7.1.3
        run: |
          patch -p1 < ../patches/0001-linux7.1-rc1-bore-6.6.3.patch
          patch -p1 < ../patches/more-ISA-levels-and-uarches-for-kernel-6.16+.patch || true
          grep -q "config X86_64_VERSION" arch/x86/Kconfig.cpu || (echo "ERRORE: opzione X86_64_VERSION mancante, patch non applicata correttamente" && exit 1)
          grep -q "config SCHED_BORE" init/Kconfig || (echo "ERRORE: opzione SCHED_BORE mancante, patch BORE non applicata correttamente" && exit 1)

      - name: Applica la config e compila con LTO+Clang
        working-directory: linux-7.1.3
        run: |
          cp ../patches/kernel.config .config
          scripts/config --enable CONFIG_LTO_CLANG_THIN
          scripts/config --disable CONFIG_LTO_NONE
          scripts/config --enable CONFIG_PREEMPT_DYNAMIC
          make LLVM=1 olddefconfig
          grep -q "^CONFIG_LTO_CLANG_THIN=y" .config || (echo "ERRORE: LTO non attivato" && exit 1)
          grep -q "^CONFIG_PREEMPT_DYNAMIC=y" .config || (echo "ERRORE: PREEMPT_DYNAMIC non attivato" && exit 1)
          make LLVM=1 -j$(nproc)
          make LLVM=1 -j$(nproc) tar-pkg

      - name: Carica il kernel compilato
        uses: actions/upload-artifact@v4
        with:
          name: nexoriaos-kernel-v2-lto
          path: linux-7.1.3/linux-7.1.3-x86.tar
